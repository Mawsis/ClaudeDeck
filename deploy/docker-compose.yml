services:
  gateway:
    build:
      context: ..
    restart: unless-stopped
    environment:
      CLAUDEDECK_HOOK_TOKEN: ${CLAUDEDECK_HOOK_TOKEN:?set CLAUDEDECK_HOOK_TOKEN in deploy/.env}
      CLAUDEDECK_DECK_TOKEN: ${CLAUDEDECK_DECK_TOKEN:?set CLAUDEDECK_DECK_TOKEN in deploy/.env}
    expose:
      - "8484"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      # VPS: your domain (auto HTTPS via Let's Encrypt). Local smoke test: ":80".
      DECK_DOMAIN: ${DECK_DOMAIN:?set DECK_DOMAIN in deploy/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  caddy_data:
  caddy_config:
