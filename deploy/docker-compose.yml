services:
  gateway:
    build:
      context: ..
    restart: unless-stopped
    environment:
      # Optional now: absent (or both empty) → a mint-only gateway that seeds no
      # implicit workspace. Set both to keep a legacy static-token deployment
      # working as one pre-seeded workspace. The mps override runs token-free.
      SLOPDECK_HOOK_TOKEN: ${SLOPDECK_HOOK_TOKEN:-}
      SLOPDECK_DECK_TOKEN: ${SLOPDECK_DECK_TOKEN:-}
      # Optional: locked-screen completion alerts via Web Push. Generate the
      # key pair with `npx web-push generate-vapid-keys`; all three or none.
      SLOPDECK_VAPID_PUBLIC_KEY: ${SLOPDECK_VAPID_PUBLIC_KEY:-}
      SLOPDECK_VAPID_PRIVATE_KEY: ${SLOPDECK_VAPID_PRIVATE_KEY:-}
      SLOPDECK_VAPID_SUBJECT: ${SLOPDECK_VAPID_SUBJECT:-}
      # Optional: turns shorter than this stay silent (default 45000).
      SLOPDECK_ALERT_THRESHOLD_MS: ${SLOPDECK_ALERT_THRESHOLD_MS:-}
      SLOPDECK_QUESTION_TIMEOUT_MS: ${SLOPDECK_QUESTION_TIMEOUT_MS:-}
    expose:
      - "8484"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      # VPS: your domain (auto HTTPS via Let's Encrypt). Local smoke test: ":80".
      # Defaults to ":80" so the mps override (which never starts Caddy) parses
      # without a domain; set a real domain in deploy/.env for the Caddy path.
      DECK_DOMAIN: ${DECK_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  caddy_data:
  caddy_config:
